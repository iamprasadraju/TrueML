site_name: TrueML Docs
site_url: "https://iamprasadraju.github.io/TrueML/"
repo_url: https://github.com/iamprasadraju/trueml
edit_uri: edit/main/docs/

theme:
  name: material
  logo: trueml-light.svg
  favicon: trueml-light.svg
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Philosophy: philosophy.md
  - Tutorials:
    - Your First Training Loop: tutorials/your-first-training-loop.md
    - Comparing Loss Functions: tutorials/comparing-loss-functions.md
  - How-to Guides:
    - Manual Gradient Descent: how-to/manual-gradient-descent.md
    - Train on Real Data: how-to/train-on-real-data.md
    - Implement Minibatch GD: how-to/implement-minibatch-gd.md
    - Debug Gradient Issues: how-to/debug-gradient-issues.md
  - Reference:
    - LinearModels:
      - LinearRegression: reference/linear-regression.md
      - LogisticRegression: reference/logistic-regression.md
    - Loss Functions:
      - AbsoluteError: reference/absolute-error.md
      - SquaredError: reference/squared-error.md
      - SignedError: reference/signed-error.md
    - Operations:
      - gemm — Matrix Operations: reference/gemm.md
      - helpers — Utilities: reference/helpers.md
  - Explanation:
    - No-Abstraction Philosophy: explanation/no-abstraction-philosophy.md
    - About Gradient Descent: explanation/about-gradient-descent.md
    - About Loss Functions: explanation/about-loss-functions.md
    - Calculus Mapping: explanation/calculus-mapping.md

