name: Publish to PyPI
on:
  release:
    types: [published]

jobs:
  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest

    environment: pypi
    
    # CRITICAL: Permissions required for trusted publishing
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5 # Automatically installs uv
      - name: Build and Publish
        run: |
          uv build
          uv publish
